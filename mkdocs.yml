      - 04 为什么 turn-history 不是 event log 镜像: guidebookv2/volume-3/2026-04-12-Codex-卷三-04-为什么-turn-history-不是-event-log-镜像.md
      - 05 active_turn_snapshot、handle_user_message 与当前工作视图的边界: guidebookv2/volume-3/2026-04-12-Codex-卷三-05-active-turn-snapshot-handle-user-message-与当前工作视图的边界.md
