site_name: Codex 源码导读手册
site_description: A public-facing source guide for understanding OpenAI Codex internals
site_url: https://t0ugh.github.io/codex-source-reading/
repo_url: https://github.com/T0UGH/codex-source-reading
repo_name: T0UGH/codex-source-reading

docs_dir: docs
site_dir: site

use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

exclude_docs: |
  guidebookv2/*

validation:
  omitted_files: ignore
  absolute_links: warn
  unrecognized_links: warn

extra_css:
  - stylesheets/mermaid.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - 首页: index.md
  - 卷一｜系统入口与总图:
      - 00 如何阅读这份导读: 00-guidebook/00-如何阅读这份导读.md
      - 01 系统总图与分层: 00-guidebook/01-系统总图与分层.md
  - 卷二｜状态、持久化与恢复:
      - 02 状态持久化与恢复: 00-guidebook/02-状态持久化与恢复.md
  - 卷三｜app-server、thread 与 turn 主线:
      - 03 app-server 与 thread-turn 主线: 00-guidebook/03-app-server与thread-turn主线.md
      - 04 turn-history 语义层: 00-guidebook/04-turn-history语义层.md
  - 卷四｜统一执行子系统:
      - 05 unified-exec 执行子系统: 00-guidebook/05-unified-exec执行子系统.md
  - 卷五｜能力系统与高级子系统:
      - 06 capability 与高级子系统: 00-guidebook/06-capability与高级子系统.md
      - 07 model-client 与 provider 请求主链: 00-guidebook/07-model-client与provider请求主链.md
      - 08 codex-client、codex-api 与 backend-client 分层: 00-guidebook/08-codex-client-codex-api与backend-client分层.md
      - 09 review 工作流与 guardian 审查基础设施: 00-guidebook/09-review工作流与guardian审查基础设施.md
      - 10 realtime、collab 与 memory 迁移专题: 00-guidebook/10-realtime-collab与memory迁移专题.md
  - 卷六｜附录、微缺口与继续深挖入口:
      - 11 关键函数索引: 00-guidebook/11-关键函数索引.md
      - 12 调用链索引: 00-guidebook/12-调用链索引.md
      - 13 open questions 与后续深挖方向: 00-guidebook/13-open-questions与后续深挖方向.md
      - 14 ServerRequestResolved 覆盖面与未迁移疑点: 00-guidebook/14-ServerRequestResolved覆盖面与未迁移疑点.md
      - 15 guardian analytics 为何还没真正接上: 00-guidebook/15-guardian-analytics为何还没真正接上.md
  - 证据层入口:
      - Codex 源码拆解总索引: 00-index/00-Codex源码拆解总索引.md
      - 代码路径索引｜入口与分发: 00-index/01-代码路径索引-入口与分发.md
      - 调用链草图｜interactive TUI 链: 02-call-chain-drafts/2026-04-11-codex主链草图-interactive-TUI链.md
      - 调用链草图｜exec 链: 02-call-chain-drafts/2026-04-11-codex主链草图-exec链.md
