site_name: Codex 源码导读手册
site_description: A public-facing source guide for understanding OpenAI Codex internals
site_url: https://t0ugh.github.io/codex-source-reading/
repo_url: https://github.com/T0UGH/codex-source-reading
repo_name: T0UGH/codex-source-reading

docs_dir: docs
site_dir: site

use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

exclude_docs: |
  guidebookv2/**/README-writing-cards*.md
  guidebookv2/**/README-production-order*.md

validation:
  omitted_files: ignore
  absolute_links: warn
  unrecognized_links: warn

extra_css:
  - stylesheets/mermaid.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - 首页: index.md
  - 开始阅读｜Guidebook v2 总览: guidebookv2/README.md
  - 卷一｜系统入口与总图:
      - 导读: guidebookv2/volume-1/index.md
      - 00 如何阅读这份导读: 00-guidebook/00-如何阅读这份导读.md
      - 01 系统总图与分层: 00-guidebook/01-系统总图与分层.md
  - 卷二｜runtime core 主线:
      - 导读: guidebookv2/volume-2/index.md
      - 01 一次请求怎么进入 Codex 的 runtime 主线: guidebookv2/volume-2/2026-04-12-Codex-新卷二-01-一次请求怎么进入-Codex-的-runtime-主线.md
      - 02 ThreadManager、CodexThread、Codex 怎么接成主工作链: guidebookv2/volume-2/2026-04-12-Codex-新卷二-02-ThreadManager-CodexThread-Codex-怎么接成主工作链.md
      - 03 当前工作面是怎么被组织出来的: guidebookv2/volume-2/2026-04-12-Codex-新卷二-03-当前工作面是怎么被组织出来的.md
      - 04 thread 和 turn 为什么不是两个平行名词: guidebookv2/volume-2/2026-04-12-Codex-新卷二-04-thread-和-turn-为什么不是两个平行名词.md
      - 05 系统怎么判断这一轮要不要调用能力: guidebookv2/volume-2/2026-04-12-Codex-新卷二-05-系统怎么判断这一轮要不要调用能力.md
      - 06 动作结果怎么重新回到当前工作回合: guidebookv2/volume-2/2026-04-12-Codex-新卷二-06-动作结果怎么重新回到当前工作回合.md
      - 07 一轮工作回合什么时候继续什么时候收口: guidebookv2/volume-2/2026-04-12-Codex-新卷二-07-一轮工作回合什么时候继续什么时候收口.md
      - 08 把整条 runtime core 主线重新压成稳定运行图: guidebookv2/volume-2/2026-04-12-Codex-新卷二-08-把整条-runtime-core-主线重新压成稳定运行图.md
  - 卷三｜状态、恢复与持续工作线:
