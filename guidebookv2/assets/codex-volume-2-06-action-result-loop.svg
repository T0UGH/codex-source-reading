<svg width="1500" height="900" viewBox="0 0 1500 900" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/></pattern><marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/></marker><style>.title{font:700 34px 'JetBrains Mono',monospace;fill:#f8fafc}.subtitle{font:500 16px 'JetBrains Mono',monospace;fill:#94a3b8}.label{font:700 18px 'JetBrains Mono',monospace;fill:#f8fafc}.sub{font:500 13px 'JetBrains Mono',monospace;fill:#94a3b8}.tiny{font:500 12px 'JetBrains Mono',monospace;fill:#cbd5e1}.section{font:700 15px 'JetBrains Mono',monospace}.legend{font:600 12px 'JetBrains Mono',monospace;fill:#cbd5e1}</style></defs><rect width="1500" height="900" rx="28" fill="#020617"/><rect x="24" y="24" width="1452" height="852" rx="24" fill="url(#grid)"/>
<circle cx="88" cy="78" r="10" fill="#38bdf8"/><text x="114" y="88" class="title">action 会短暂出去，但会回到当前 turn</text><text x="88" y="120" class="subtitle">卷二第六篇先立住：tool result 会写回同一 turn 的 history，再次进入 sampling 输入。</text>
<rect x="150" y="222" width="1190" height="254" rx="26" fill="rgba(56,189,248,0.06)" stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="12 8"/><text x="186" y="258" class="section" fill="#38bdf8">当前 turn 内的动作闭环</text>
<rect x="198" y="336" width="202" height="110" rx="18" fill="rgba(56,189,248,0.14)" stroke="#38bdf8" stroke-width="2.2"/><text x="299" y="376" text-anchor="middle" class="label">当前 turn sampling</text><text x="299" y="404" text-anchor="middle" class="sub">这轮判断先发起采样</text>
<rect x="454" y="336" width="202" height="110" rx="18" fill="rgba(56,189,248,0.14)" stroke="#38bdf8" stroke-width="2.2"/><text x="555" y="376" text-anchor="middle" class="label">模型产出 tool call</text><text x="555" y="404" text-anchor="middle" class="sub">runtime 先识别正式工具调用</text>
<rect x="710" y="336" width="202" height="110" rx="18" fill="rgba(251,146,60,0.16)" stroke="#fb923c" stroke-width="2.2"/><text x="811" y="376" text-anchor="middle" class="label">工具 / 执行子系统</text><text x="811" y="404" text-anchor="middle" class="sub">短暂出去拿结果</text>
<rect x="966" y="336" width="202" height="110" rx="18" fill="rgba(56,189,248,0.14)" stroke="#38bdf8" stroke-width="2.2"/><text x="1067" y="376" text-anchor="middle" class="label">写回 turn history</text><text x="1067" y="404" text-anchor="middle" class="sub">tool result 进入同一轮会话历史</text>
<line x1="400" y1="391" x2="454" y2="391" stroke="#38bdf8" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="656" y1="391" x2="710" y2="391" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="912" y1="391" x2="966" y2="391" stroke="#38bdf8" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="486" y="572" width="528" height="126" rx="18" fill="rgba(52,211,153,0.16)" stroke="#34d399" stroke-width="2.2"/><text x="750" y="614" text-anchor="middle" class="label">重新构造 sampling_request_input</text><text x="750" y="644" text-anchor="middle" class="sub">下一次采样又从这份更新后的 history 取输入</text><text x="750" y="670" text-anchor="middle" class="tiny">所以 action 不是另起一条线，而是重新并回当前 turn 再继续判断</text>
<path d="M 1067 446 L 1067 520 Q 1067 572 1014 572" stroke="#34d399" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/><path d="M 486 634 L 388 634 Q 322 634 322 446" stroke="#34d399" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="198" y="778" width="1104" height="88" rx="18" fill="rgba(30,41,59,0.44)" stroke="#94a3b8" stroke-width="1.8"/><text x="750" y="814" text-anchor="middle" class="label">关键不是“有工具”，而是“结果如何回到当前 turn”</text><text x="750" y="842" text-anchor="middle" class="sub">结果不只停在执行层；它会写回会话历史，再成为同一轮下一次判断输入。</text></svg>