<svg width="1500" height="920" viewBox="0 0 1500 920" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/></pattern><marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/></marker><style>.title{font:700 34px 'JetBrains Mono',monospace;fill:#f8fafc}.subtitle{font:500 16px 'JetBrains Mono',monospace;fill:#94a3b8}.label{font:700 18px 'JetBrains Mono',monospace;fill:#f8fafc}.sub{font:500 13px 'JetBrains Mono',monospace;fill:#94a3b8}.tiny{font:500 12px 'JetBrains Mono',monospace;fill:#cbd5e1}.section{font:700 15px 'JetBrains Mono',monospace}.legend{font:600 12px 'JetBrains Mono',monospace;fill:#cbd5e1}</style></defs><rect width="1500" height="920" rx="28" fill="#020617"/><rect x="24" y="24" width="1452" height="872" rx="24" fill="url(#grid)"/>
<circle cx="88" cy="78" r="10" fill="#38bdf8"/><text x="114" y="88" class="title">恢复回来后，继续工作的不是消息堆</text><text x="88" y="120" class="subtitle">卷三第三篇先立住：thread、turn、pending request 一起组成可继续运行的工作线。</text>
<rect x="172" y="214" width="1156" height="296" rx="26" fill="rgba(56,189,248,0.06)" stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="12 8"/><text x="206" y="250" class="section" fill="#38bdf8">持续工作线的三层结构</text>
<rect x="220" y="334" width="244" height="132" rx="18" fill="rgba(56,189,248,0.14)" stroke="#38bdf8" stroke-width="2.2"/><text x="342" y="376" text-anchor="middle" class="label">thread</text><text x="342" y="406" text-anchor="middle" class="sub">正式工作线承载单元</text><text x="342" y="432" text-anchor="middle" class="tiny">先回答“现在接回来的是哪一条线”</text>
<rect x="628" y="334" width="244" height="132" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="750" y="376" text-anchor="middle" class="label">turn</text><text x="750" y="406" text-anchor="middle" class="sub">当前工作轮次边界</text><text x="750" y="432" text-anchor="middle" class="tiny">回答“这一轮停在哪里、怎么继续推进”</text>
<rect x="1036" y="334" width="244" height="132" rx="18" fill="rgba(251,146,60,0.16)" stroke="#fb923c" stroke-width="2.2"/><text x="1158" y="376" text-anchor="middle" class="label">pending request</text><text x="1158" y="406" text-anchor="middle" class="sub">未决工作 / 未决请求</text><text x="1158" y="432" text-anchor="middle" class="tiny">回答“这条线还欠着什么、恢复后还要接着处理什么”</text>
<line x1="464" y1="400" x2="628" y2="400" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="872" y1="400" x2="1036" y2="400" stroke="#fb923c" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="360" y="594" width="780" height="128" rx="18" fill="rgba(30,41,59,0.48)" stroke="#94a3b8" stroke-width="2"/><text x="750" y="636" text-anchor="middle" class="label">恢复后真正被接回来的是什么</text><text x="750" y="666" text-anchor="middle" class="sub">不是聊天记录列表，而是 thread、turn、pending request 组成的工作线。</text><text x="750" y="692" text-anchor="middle" class="tiny">所以 Codex 恢复的不是“最后一条消息”，而是“还能继续跑的正式工作线结构”。</text>
<rect x="160" y="792" width="1180" height="88" rx="18" fill="rgba(30,41,59,0.44)" stroke="#94a3b8" stroke-width="1.8"/><text x="750" y="828" text-anchor="middle" class="label">一句话收口</text><text x="750" y="856" text-anchor="middle" class="sub">thread 决定线是否存在，turn 决定当前推进到哪一轮，pending request 决定恢复后还要补什么未决工作。</text></svg>