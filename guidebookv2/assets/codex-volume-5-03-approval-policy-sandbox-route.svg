<svg width="1500" height="920" viewBox="0 0 1500 920" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/></pattern><marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/></marker><style>.title{font:700 34px 'JetBrains Mono',monospace;fill:#f8fafc}.subtitle{font:500 16px 'JetBrains Mono',monospace;fill:#94a3b8}.label{font:700 18px 'JetBrains Mono',monospace;fill:#f8fafc}.sub{font:500 13px 'JetBrains Mono',monospace;fill:#94a3b8}.tiny{font:500 12px 'JetBrains Mono',monospace;fill:#cbd5e1}.section{font:700 15px 'JetBrains Mono',monospace}.legend{font:600 12px 'JetBrains Mono',monospace;fill:#cbd5e1}</style></defs><rect width="1500" height="920" rx="28" fill="#020617"/><rect x="24" y="24" width="1452" height="872" rx="24" fill="url(#grid)"/>
<circle cx="88" cy="78" r="10" fill="#fbbf24"/><text x="114" y="88" class="title">执行前主链：approval、policy、sandbox、route</text><text x="88" y="120" class="subtitle">卷五第三篇先立住：这四层会直接改写执行请求是否成立、如何成立。</text>
<rect x="154" y="212" width="1192" height="280" rx="26" fill="rgba(251,191,36,0.06)" stroke="#fbbf24" stroke-width="1.8" stroke-dasharray="12 8"/><text x="190" y="248" class="section" fill="#fbbf24">执行前主链</text>
<rect x="204" y="332" width="198" height="120" rx="18" fill="rgba(251,191,36,0.18)" stroke="#fbbf24" stroke-width="2.2"/><text x="303" y="372" text-anchor="middle" class="label">approval</text><text x="303" y="400" text-anchor="middle" class="sub">先判断要不要放行</text><text x="303" y="426" text-anchor="middle" class="tiny">不是执行后再问，而是执行前门禁</text>
<rect x="450" y="332" width="198" height="120" rx="18" fill="rgba(251,191,36,0.18)" stroke="#fbbf24" stroke-width="2.2"/><text x="549" y="372" text-anchor="middle" class="label">policy</text><text x="549" y="400" text-anchor="middle" class="sub">规则解释器</text><text x="549" y="426" text-anchor="middle" class="tiny">判断这次请求能不能继续往下走</text>
<rect x="696" y="332" width="198" height="120" rx="18" fill="rgba(251,191,36,0.18)" stroke="#fbbf24" stroke-width="2.2"/><text x="795" y="372" text-anchor="middle" class="label">sandbox</text><text x="795" y="400" text-anchor="middle" class="sub">环境塑形器</text><text x="795" y="426" text-anchor="middle" class="tiny">决定 argv / env / helper 的约束形态</text>
<rect x="942" y="332" width="224" height="120" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="1054" y="372" text-anchor="middle" class="label">runtime route</text><text x="1054" y="400" text-anchor="middle" class="sub">最后一公里现实分流</text><text x="1054" y="426" text-anchor="middle" class="tiny">local / remote / backend / session 形式</text>
<line x1="402" y1="392" x2="450" y2="392" stroke="#fbbf24" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="648" y1="392" x2="696" y2="392" stroke="#fbbf24" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="894" y1="392" x2="942" y2="392" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="496" y="586" width="508" height="126" rx="18" fill="rgba(30,41,59,0.48)" stroke="#94a3b8" stroke-width="2"/><text x="750" y="628" text-anchor="middle" class="label">launch-ready ExecRequest</text><text x="750" y="658" text-anchor="middle" class="sub">到这里，请求才变成可被 process manager 启动的方案</text><text x="750" y="684" text-anchor="middle" class="tiny">route 不是执行后标签，而是执行前最后一公里分流</text>
<path d="M 1054 452 L 1054 534 Q 1054 586 1004 586" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="170" y="788" width="1160" height="92" rx="18" fill="rgba(30,41,59,0.44)" stroke="#94a3b8" stroke-width="1.8"/><text x="750" y="824" text-anchor="middle" class="label">本篇最该压住的判断</text><text x="750" y="852" text-anchor="middle" class="sub">这四层不是外围检查，而是一起决定执行请求是否成立、以什么形态成立。</text></svg>