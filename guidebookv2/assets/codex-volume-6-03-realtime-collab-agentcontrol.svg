<svg width="1500" height="900" viewBox="0 0 1500 900" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/></pattern><marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/></marker><style>.title{font:700 34px 'JetBrains Mono',monospace;fill:#f8fafc}.subtitle{font:500 16px 'JetBrains Mono',monospace;fill:#94a3b8}.label{font:700 18px 'JetBrains Mono',monospace;fill:#f8fafc}.sub{font:500 13px 'JetBrains Mono',monospace;fill:#94a3b8}.tiny{font:500 12px 'JetBrains Mono',monospace;fill:#cbd5e1}.section{font:700 15px 'JetBrains Mono',monospace}.legend{font:600 12px 'JetBrains Mono',monospace;fill:#cbd5e1}</style></defs><rect width="1500" height="900" rx="28" fill="#020617"/><rect x="24" y="24" width="1452" height="852" rx="24" fill="url(#grid)"/>
<circle cx="88" cy="78" r="10" fill="#38bdf8"/><text x="114" y="88" class="title">realtime、collab、AgentControl：三段不同职责</text><text x="88" y="120" class="subtitle">卷六第三篇最重要的不是箭头方向，而是先把 live conversation、live collaboration、thread-tree control plane 三层切开。</text>
<rect x="170" y="220" width="1160" height="292" rx="26" fill="rgba(56,189,248,0.06)" stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="12 8"/><text x="204" y="256" class="section" fill="#38bdf8">协作运行分层</text>
<rect x="226" y="332" width="248" height="126" rx="18" fill="rgba(56,189,248,0.14)" stroke="#38bdf8" stroke-width="2.2"/><text x="350" y="374" text-anchor="middle" class="label">主线程 / 普通 turn runtime</text><text x="350" y="404" text-anchor="middle" class="sub">既有 thread / turn 主线</text><text x="350" y="430" text-anchor="middle" class="tiny">三者都站在这条主线之外继续展开</text>
<rect x="564" y="316" width="244" height="142" rx="18" fill="rgba(56,189,248,0.14)" stroke="#38bdf8" stroke-width="2.2"/><text x="686" y="358" text-anchor="middle" class="label">realtime layer</text><text x="686" y="388" text-anchor="middle" class="sub">live conversation runtime</text><text x="686" y="414" text-anchor="middle" class="tiny">维护活会话、response create、handoff</text>
<rect x="892" y="316" width="244" height="142" rx="18" fill="rgba(52,211,153,0.16)" stroke="#34d399" stroke-width="2.2"/><text x="1014" y="358" text-anchor="middle" class="label">collab runtime</text><text x="1014" y="388" text-anchor="middle" class="sub">live collaboration</text><text x="1014" y="414" text-anchor="middle" class="tiny">多主体 spawn / wait / resume / close</text>
<rect x="1072" y="580" width="248" height="126" rx="18" fill="rgba(168,85,247,0.16)" stroke="#a78bfa" stroke-width="2.2"/><text x="1196" y="622" text-anchor="middle" class="label">AgentControl</text><text x="1196" y="652" text-anchor="middle" class="sub">rooted thread-tree control plane</text><text x="1196" y="678" text-anchor="middle" class="tiny">它不是并列 feature，而是 collab 内部控制面核心</text>
<line x1="474" y1="394" x2="564" y2="394" stroke="#38bdf8" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="474" y1="414" x2="892" y2="414" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrow)"/><path d="M 1014 458 L 1014 520 Q 1014 580 1072 580" stroke="#a78bfa" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="184" y="760" width="1132" height="94" rx="18" fill="rgba(30,41,59,0.44)" stroke="#94a3b8" stroke-width="1.8"/><text x="750" y="798" text-anchor="middle" class="label">这张图真正要压住的判断</text><text x="750" y="826" text-anchor="middle" class="sub">realtime 面向活会话，collab 面向活协作，AgentControl 面向 collab 内部那棵 thread tree 的控制与编排。</text></svg>