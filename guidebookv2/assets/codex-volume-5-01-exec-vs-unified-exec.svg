<svg width="1500" height="900" viewBox="0 0 1500 900" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/></pattern><marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/></marker><style>.title{font:700 34px 'JetBrains Mono',monospace;fill:#f8fafc}.subtitle{font:500 16px 'JetBrains Mono',monospace;fill:#94a3b8}.label{font:700 18px 'JetBrains Mono',monospace;fill:#f8fafc}.sub{font:500 13px 'JetBrains Mono',monospace;fill:#94a3b8}.tiny{font:500 12px 'JetBrains Mono',monospace;fill:#cbd5e1}.section{font:700 15px 'JetBrains Mono',monospace}.legend{font:600 12px 'JetBrains Mono',monospace;fill:#cbd5e1}</style></defs><rect width="1500" height="900" rx="28" fill="#020617"/><rect x="24" y="24" width="1452" height="852" rx="24" fill="url(#grid)"/>
<circle cx="88" cy="78" r="10" fill="#34d399"/><text x="114" y="88" class="title">exec.rs vs unified-exec：上下层关系图</text><text x="88" y="120" class="subtitle">exec.rs 靠近执行原语；unified-exec 站在它上面，把动作请求装成可管理的执行会话。</text>
<rect x="166" y="210" width="1168" height="260" rx="26" fill="rgba(52,211,153,0.05)" stroke="#34d399" stroke-width="1.8" stroke-dasharray="12 8"/><text x="198" y="246" class="section" fill="#34d399">执行链分层</text>
<rect x="214" y="314" width="210" height="112" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="319" y="354" text-anchor="middle" class="label">tool / agent action</text><text x="319" y="382" text-anchor="middle" class="sub">模型或工具入口发起动作</text>
<rect x="470" y="314" width="220" height="112" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="580" y="354" text-anchor="middle" class="label">UnifiedExecHandler</text><text x="580" y="382" text-anchor="middle" class="sub">先装配请求，再挂上语义入口</text>
<rect x="736" y="314" width="220" height="112" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="846" y="354" text-anchor="middle" class="label">UnifiedExecRuntime</text><text x="846" y="382" text-anchor="middle" class="sub">把动作纳入统一控制链</text>
<rect x="1002" y="314" width="220" height="112" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="1112" y="354" text-anchor="middle" class="label">session 管理</text><text x="1112" y="382" text-anchor="middle" class="sub">建立 process / session 身份</text>
<rect x="568" y="548" width="364" height="120" rx="20" fill="rgba(251,146,60,0.16)" stroke="#fb923c" stroke-width="2.2"/><text x="750" y="590" text-anchor="middle" class="label">exec.rs / sandbox / execute_env</text><text x="750" y="620" text-anchor="middle" class="sub">靠近 OS 执行原语、约束与环境适配</text><text x="750" y="646" text-anchor="middle" class="tiny">它统一的是执行通路，不等于执行会话系统</text>
<line x1="424" y1="370" x2="470" y2="370" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="690" y1="370" x2="736" y2="370" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="956" y1="370" x2="1002" y2="370" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrow)"/><path d="M 1112 426 L 1112 492 Q 1112 548 1056 548 L 932 548" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="180" y="738" width="1140" height="102" rx="18" fill="rgba(30,41,59,0.44)" stroke="#94a3b8" stroke-width="1.8"/><text x="750" y="776" text-anchor="middle" class="label">怎么读这张图</text><text x="750" y="806" text-anchor="middle" class="sub">先看上面：unified-exec 把动作请求变成系统对象；再看下面：exec.rs 把对象送进执行底盘。</text><text x="750" y="832" text-anchor="middle" class="tiny">不是谁替代谁，而是谁更靠近运行链。</text>
</svg>