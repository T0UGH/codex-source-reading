<svg width="1500" height="920" viewBox="0 0 1500 920" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/></pattern><marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/></marker><style>.title{font:700 34px 'JetBrains Mono',monospace;fill:#f8fafc}.subtitle{font:500 16px 'JetBrains Mono',monospace;fill:#94a3b8}.label{font:700 18px 'JetBrains Mono',monospace;fill:#f8fafc}.sub{font:500 13px 'JetBrains Mono',monospace;fill:#94a3b8}.tiny{font:500 12px 'JetBrains Mono',monospace;fill:#cbd5e1}.section{font:700 15px 'JetBrains Mono',monospace}.legend{font:600 12px 'JetBrains Mono',monospace;fill:#cbd5e1}</style></defs><rect width="1500" height="920" rx="28" fill="#020617"/><rect x="24" y="24" width="1452" height="872" rx="24" fill="url(#grid)"/>
<circle cx="88" cy="78" r="10" fill="#fbbf24"/><text x="114" y="88" class="title">输出先进入 transcript：delta 与 final 共用一条语义轨</text><text x="88" y="120" class="subtitle">transcript 是中轴：delta 负责进行中观察，final output 负责收尾裁决。</text>
<rect x="188" y="218" width="1124" height="256" rx="26" fill="rgba(251,191,36,0.06)" stroke="#fbbf24" stroke-width="1.8" stroke-dasharray="12 8"/>
<text x="220" y="254" class="section" fill="#fbbf24">统一输出语义轨</text>
<rect x="244" y="318" width="214" height="114" rx="18" fill="rgba(251,191,36,0.16)" stroke="#fbbf24" stroke-width="2.2"/><text x="351" y="358" text-anchor="middle" class="label">process raw bytes</text><text x="351" y="386" text-anchor="middle" class="sub">底层进程原始输出</text>
<rect x="516" y="318" width="214" height="114" rx="18" fill="rgba(251,191,36,0.16)" stroke="#fbbf24" stroke-width="2.2"/><text x="623" y="358" text-anchor="middle" class="label">process_chunk</text><text x="623" y="386" text-anchor="middle" class="sub">把 bytes 切进可解释语义</text>
<rect x="788" y="300" width="240" height="148" rx="20" fill="rgba(56,189,248,0.12)" stroke="#38bdf8" stroke-width="2.2"/><text x="908" y="344" text-anchor="middle" class="label">transcript</text><text x="908" y="374" text-anchor="middle" class="sub">执行中的主语义轨</text><text x="908" y="400" text-anchor="middle" class="tiny">只有进入 transcript，输出才真正进入执行语义世界</text>
<rect x="1086" y="236" width="188" height="112" rx="18" fill="rgba(52,211,153,0.14)" stroke="#34d399" stroke-width="2.2"/><text x="1180" y="276" text-anchor="middle" class="label">output delta</text><text x="1180" y="304" text-anchor="middle" class="sub">进行中增量发射</text>
<rect x="1086" y="382" width="220" height="112" rx="18" fill="rgba(52,211,153,0.14)" stroke="#34d399" stroke-width="2.2"/><text x="1196" y="422" text-anchor="middle" class="label">resolve_aggregated_output</text><text x="1196" y="450" text-anchor="middle" class="sub">收尾时统一裁决</text>
<rect x="620" y="576" width="260" height="112" rx="18" fill="rgba(30,41,59,0.48)" stroke="#94a3b8" stroke-width="2"/><text x="750" y="616" text-anchor="middle" class="label">final output</text><text x="750" y="644" text-anchor="middle" class="sub">执行结束后的正式结果</text>
<line x1="458" y1="375" x2="516" y2="375" stroke="#fbbf24" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="730" y1="375" x2="788" y2="375" stroke="#fbbf24" stroke-width="2.2" marker-end="url(#arrow)"/><path d="M 1028 342 L 1086 292" stroke="#38bdf8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/><path d="M 1028 408 L 1086 438" stroke="#38bdf8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/><path d="M 1196 494 L 1196 550 Q 1196 576 1170 576 L 880 576" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="204" y="744" width="1092" height="108" rx="18" fill="rgba(30,41,59,0.44)" stroke="#94a3b8" stroke-width="1.8"/><text x="750" y="782" text-anchor="middle" class="label">三层对象，不是一层对象</text><text x="750" y="812" text-anchor="middle" class="sub">raw stream 管字节；transcript / delta 管进行中语义；final output 管收尾裁决。</text><text x="750" y="838" text-anchor="middle" class="tiny">流式输出不是 final 的提前泄露，而是在执行中建立可观察语义轨。</text>
</svg>