<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/>
    </pattern>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/>
    </marker>
    <style>
      .title { font: 700 34px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #f8fafc; }
      .subtitle { font: 500 16px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #94a3b8; }
      .section { font: 700 15px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
      .label { font: 700 18px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #f8fafc; }
      .sub { font: 500 13px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #94a3b8; }
      .tiny { font: 500 12px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #cbd5e1; }
      .legend { font: 600 12px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1400" height="860" rx="28" fill="#020617"/>
  <rect x="24" y="24" width="1352" height="812" rx="24" fill="url(#grid)"/>

  <circle cx="88" cy="78" r="10" fill="#22d3ee"/>
  <text x="114" y="88" class="title">Codex interactive 主请求流总图</text>
  <text x="88" y="120" class="subtitle">卷一第二篇先立住：请求层层换职责，动作会短暂分叉，结果还得回到同一轮工作回合。</text>

  <rect x="56" y="194" width="142" height="92" rx="16" fill="rgba(30,41,59,0.62)" stroke="#94a3b8" stroke-width="2"/>
  <text x="127" y="234" text-anchor="middle" class="label">用户</text>
  <text x="127" y="260" text-anchor="middle" class="sub">terminal input</text>

  <rect x="244" y="178" width="170" height="124" rx="18" fill="rgba(8,51,68,0.32)" stroke="#22d3ee" stroke-width="2.2"/>
  <text x="329" y="220" text-anchor="middle" class="label">CLI</text>
  <text x="329" y="248" text-anchor="middle" class="sub">入口壳 / 模式分流</text>
  <text x="329" y="274" text-anchor="middle" class="tiny">把人送进正确产品面</text>

  <rect x="462" y="178" width="170" height="124" rx="18" fill="rgba(8,51,68,0.32)" stroke="#22d3ee" stroke-width="2.2"/>
  <text x="547" y="220" text-anchor="middle" class="label">TUI</text>
  <text x="547" y="248" text-anchor="middle" class="sub">交互前端 / 驾驶舱</text>
  <text x="547" y="274" text-anchor="middle" class="tiny">接输入 · 组织动作 · 渲染状态</text>

  <rect x="680" y="170" width="248" height="140" rx="20" fill="rgba(120,53,15,0.22)" stroke="#fbbf24" stroke-width="2.2"/>
  <text x="804" y="214" text-anchor="middle" class="label">app-server</text>
  <text x="804" y="244" text-anchor="middle" class="sub">控制面 / facade</text>
  <text x="804" y="268" text-anchor="middle" class="sub">request · state projection</text>
  <text x="804" y="292" text-anchor="middle" class="tiny">把 runtime 暴露成稳定接口面</text>

  <rect x="302" y="380" width="790" height="262" rx="24" fill="rgba(52,211,153,0.05)" stroke="#34d399" stroke-width="1.8" stroke-dasharray="12 8"/>
  <text x="334" y="416" class="section" fill="#34d399">runtime core / 真正开始推进这一轮工作的地方</text>

  <rect x="352" y="464" width="194" height="134" rx="18" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2.3"/>
  <text x="449" y="506" text-anchor="middle" class="label">ThreadManager</text>
  <text x="449" y="536" text-anchor="middle" class="sub">live thread 协调入口</text>
  <text x="449" y="562" text-anchor="middle" class="tiny">找到或建立工作线</text>

  <rect x="602" y="464" width="194" height="134" rx="18" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2.3"/>
  <text x="699" y="506" text-anchor="middle" class="label">CodexThread</text>
  <text x="699" y="536" text-anchor="middle" class="sub">线程级正式交互面</text>
  <text x="699" y="562" text-anchor="middle" class="tiny">把请求挂到某条 live thread</text>

  <rect x="852" y="464" width="194" height="134" rx="18" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2.3"/>
  <text x="949" y="506" text-anchor="middle" class="label">Codex</text>
  <text x="949" y="536" text-anchor="middle" class="sub">session / turn loop</text>
  <text x="949" y="562" text-anchor="middle" class="tiny">组织工作面 · 做判断 · 推进回合</text>

  <rect x="468" y="664" width="456" height="118" rx="18" fill="rgba(30,41,59,0.48)" stroke="#94a3b8" stroke-width="2"/>
  <text x="696" y="704" text-anchor="middle" class="label">向上回程：事件投影 → TUI 渲染</text>
  <text x="696" y="734" text-anchor="middle" class="sub">runtime 结果会先经过 app-server 投影，再回到 TUI</text>

  <rect x="1126" y="446" width="214" height="156" rx="18" fill="rgba(251,146,60,0.16)" stroke="#fb923c" stroke-width="2"/>
  <text x="1233" y="486" text-anchor="middle" class="label">动作路径</text>
  <text x="1233" y="516" text-anchor="middle" class="sub">tool / exec / search / env read</text>
  <text x="1233" y="542" text-anchor="middle" class="sub">短暂分叉出去拿结果</text>
  <text x="1233" y="570" text-anchor="middle" class="tiny">不是另起一条主线</text>

  <line x1="198" y1="240" x2="244" y2="240" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrowhead)"/>
  <line x1="414" y1="240" x2="462" y2="240" stroke="#22d3ee" stroke-width="2.2" marker-end="url(#arrowhead)"/>
  <line x1="632" y1="240" x2="680" y2="240" stroke="#22d3ee" stroke-width="2.2" marker-end="url(#arrowhead)"/>
  <line x1="804" y1="310" x2="804" y2="460" stroke="#fbbf24" stroke-width="2.2" marker-end="url(#arrowhead)"/>
  <text x="824" y="390" class="legend">控制面把请求送入 live thread runtime</text>

  <line x1="546" y1="532" x2="602" y2="532" stroke="#34d399" stroke-width="2.4" marker-end="url(#arrowhead)"/>
  <line x1="796" y1="532" x2="852" y2="532" stroke="#34d399" stroke-width="2.4" marker-end="url(#arrowhead)"/>

  <path d="M 1046 532 L 1126 532" stroke="#34d399" stroke-width="2.4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1088" y="518" text-anchor="middle" class="legend">需要动作时短暂分叉</text>

  <path d="M 1233 602 L 1233 648 Q 1233 676 1205 676 L 996 676 Q 966 676 966 598" stroke="#fb923c" stroke-width="2.2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1170" y="702" class="legend">结果必须回流当前回合，再决定继续还是收口</text>

  <path d="M 696 664 L 696 618" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 680 178 L 602 178 Q 564 178 564 154 L 564 136" stroke="none"/>
  <path d="M 804 170 L 804 138 Q 804 114 780 114 L 170 114" stroke="none"/>

  <path d="M 948 464 L 948 374 Q 948 344 918 344 L 834 344" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="6 4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="972" y="372" class="legend">用户看见的不是裸 runtime，而是被投影后的状态</text>

  <rect x="60" y="792" width="14" height="14" rx="3" fill="rgba(8,51,68,0.4)" stroke="#22d3ee"/>
  <text x="84" y="804" class="legend">入口壳 / 交互前端</text>
  <rect x="250" y="792" width="14" height="14" rx="3" fill="rgba(120,53,15,0.3)" stroke="#fbbf24"/>
  <text x="274" y="804" class="legend">控制面 / app-server</text>
  <rect x="462" y="792" width="14" height="14" rx="3" fill="rgba(6,78,59,0.4)" stroke="#34d399"/>
  <text x="486" y="804" class="legend">runtime core</text>
  <rect x="626" y="792" width="14" height="14" rx="3" fill="rgba(251,146,60,0.18)" stroke="#fb923c"/>
  <text x="650" y="804" class="legend">动作分叉 / 回流</text>
  <line x1="890" y1="799" x2="926" y2="799" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="938" y="804" class="legend">主请求流 / 回流关系</text>
</svg>
