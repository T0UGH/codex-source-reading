<svg width="1500" height="900" viewBox="0 0 1500 900" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/></pattern><marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/></marker><style>.title{font:700 34px 'JetBrains Mono',monospace;fill:#f8fafc}.subtitle{font:500 16px 'JetBrains Mono',monospace;fill:#94a3b8}.label{font:700 18px 'JetBrains Mono',monospace;fill:#f8fafc}.sub{font:500 13px 'JetBrains Mono',monospace;fill:#94a3b8}.tiny{font:500 12px 'JetBrains Mono',monospace;fill:#cbd5e1}.section{font:700 15px 'JetBrains Mono',monospace}.legend{font:600 12px 'JetBrains Mono',monospace;fill:#cbd5e1}</style></defs><rect width="1500" height="900" rx="28" fill="#020617"/><rect x="24" y="24" width="1452" height="852" rx="24" fill="url(#grid)"/>
<circle cx="88" cy="78" r="10" fill="#38bdf8"/><text x="114" y="88" class="title">guardian：四层基础设施图</text><text x="88" y="120" class="subtitle">先看请求接入，再看审查运行，再看回写，最后看分析预留。</text>
<rect x="160" y="196" width="1180" height="500" rx="26" fill="rgba(56,189,248,0.06)" stroke="#38bdf8" stroke-width="1.8" stroke-dasharray="12 8"/>
<text x="196" y="232" class="section" fill="#38bdf8">guardian 基础设施分层</text>
<rect x="220" y="296" width="220" height="170" rx="20" fill="rgba(56,189,248,0.14)" stroke="#38bdf8" stroke-width="2.2"/><text x="330" y="340" text-anchor="middle" class="label">1. 请求接入层</text><text x="330" y="372" text-anchor="middle" class="sub">patch / tool / network / MCP</text><text x="330" y="398" text-anchor="middle" class="sub">delegated action approval</text><text x="330" y="430" text-anchor="middle" class="tiny">多种 approval surface 收束到同一 backend</text>
<rect x="490" y="296" width="220" height="170" rx="20" fill="rgba(56,189,248,0.14)" stroke="#38bdf8" stroke-width="2.2"/><text x="600" y="340" text-anchor="middle" class="label">2. 审查运行层</text><text x="600" y="372" text-anchor="middle" class="sub">trunk / fork / snapshot</text><text x="600" y="398" text-anchor="middle" class="sub">受限 guardian reviewer</text><text x="600" y="430" text-anchor="middle" class="tiny">高责任、低自由度；重点不是执行，而是裁决</text>
<rect x="760" y="296" width="220" height="170" rx="20" fill="rgba(56,189,248,0.14)" stroke="#38bdf8" stroke-width="2.2"/><text x="870" y="340" text-anchor="middle" class="label">3. 回写层</text><text x="870" y="372" text-anchor="middle" class="sub">Approved / Denied / TimedOut / Aborted</text><text x="870" y="398" text-anchor="middle" class="sub">write-back · UI projection</text><text x="870" y="430" text-anchor="middle" class="tiny">结果同时回到执行链，也回到协议观察面</text>
<rect x="1030" y="296" width="220" height="170" rx="20" fill="rgba(168,85,247,0.12)" stroke="#a78bfa" stroke-width="2.2" stroke-dasharray="8 6"/><text x="1140" y="340" text-anchor="middle" class="label">4. 分析预留层</text><text x="1140" y="372" text-anchor="middle" class="sub">custom fact → reducer → event</text><text x="1140" y="398" text-anchor="middle" class="sub">analytics emission</text><text x="1140" y="430" text-anchor="middle" class="tiny">不是当前主线，但说明它天生按基础设施方式预留扩展</text>
<line x1="440" y1="381" x2="490" y2="381" stroke="#38bdf8" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="710" y1="381" x2="760" y2="381" stroke="#38bdf8" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="980" y1="381" x2="1030" y2="381" stroke="#94a3b8" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<rect x="254" y="558" width="952" height="78" rx="16" fill="rgba(30,41,59,0.44)" stroke="#94a3b8" stroke-width="1.8"/><text x="730" y="590" text-anchor="middle" class="sub" style="font-size:15px">feature 更关心用户怎么点进来；guardian 更关心审批请求怎样被统一接管、裁决与回写。</text><text x="730" y="618" text-anchor="middle" class="tiny">所以它更像一套审查基础设施，而不是一条普通功能链。</text>
<rect x="228" y="744" width="1044" height="86" rx="18" fill="rgba(251,191,36,0.12)" stroke="#fbbf24" stroke-width="1.4"/><text x="750" y="780" text-anchor="middle" class="label">本篇最该稳住的判断</text><text x="750" y="810" text-anchor="middle" class="sub">guardian 先是统一 approval backend，再是受限审查运行器。</text>
</svg>