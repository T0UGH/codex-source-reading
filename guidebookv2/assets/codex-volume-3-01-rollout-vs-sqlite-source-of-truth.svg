<svg width="1500" height="920" viewBox="0 0 1500 920" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/></pattern><marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/></marker><style>.title{font:700 34px 'JetBrains Mono',monospace;fill:#f8fafc}.subtitle{font:500 16px 'JetBrains Mono',monospace;fill:#94a3b8}.label{font:700 18px 'JetBrains Mono',monospace;fill:#f8fafc}.sub{font:500 13px 'JetBrains Mono',monospace;fill:#94a3b8}.tiny{font:500 12px 'JetBrains Mono',monospace;fill:#cbd5e1}.section{font:700 15px 'JetBrains Mono',monospace}.legend{font:600 12px 'JetBrains Mono',monospace;fill:#cbd5e1}</style></defs><rect width="1500" height="920" rx="28" fill="#020617"/><rect x="24" y="24" width="1452" height="872" rx="24" fill="url(#grid)"/>
<circle cx="88" cy="78" r="10" fill="#a78bfa"/><text x="114" y="88" class="title">rollout 是正文真相源，SQLite 是索引与辅助状态层</text><text x="88" y="120" class="subtitle">卷三第一篇先立住：恢复线程时，系统先相信 rollout history。</text>
<rect x="160" y="212" width="1180" height="300" rx="26" fill="rgba(168,85,247,0.08)" stroke="#a78bfa" stroke-width="1.8" stroke-dasharray="12 8"/><text x="194" y="248" class="section" fill="#a78bfa">三层状态</text>
<rect x="214" y="332" width="220" height="132" rx="18" fill="rgba(168,85,247,0.16)" stroke="#a78bfa" stroke-width="2.2"/><text x="324" y="374" text-anchor="middle" class="label">配置状态</text><text x="324" y="404" text-anchor="middle" class="sub">系统该怎么启动和运行</text><text x="324" y="430" text-anchor="middle" class="tiny">model / cwd / feature / policy</text>
<rect x="500" y="316" width="252" height="164" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="626" y="360" text-anchor="middle" class="label">rollout history</text><text x="626" y="390" text-anchor="middle" class="sub">正文历史 / 真相源</text><text x="626" y="418" text-anchor="middle" class="tiny">恢复时真正再次进入 reconstruction 的原始材料</text>
<rect x="818" y="332" width="246" height="132" rx="18" fill="rgba(56,189,248,0.14)" stroke="#38bdf8" stroke-width="2.2"/><text x="941" y="374" text-anchor="middle" class="label">SQLite state DB</text><text x="941" y="404" text-anchor="middle" class="sub">metadata / index / side state</text><text x="941" y="430" text-anchor="middle" class="tiny">好查、好列、好展示、辅助恢复</text>
<line x1="434" y1="398" x2="500" y2="398" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="752" y1="398" x2="818" y2="398" stroke="#38bdf8" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="452" y="594" width="596" height="126" rx="18" fill="rgba(30,41,59,0.48)" stroke="#94a3b8" stroke-width="2"/><text x="750" y="636" text-anchor="middle" class="label">恢复主链</text><text x="750" y="666" text-anchor="middle" class="sub">resume_thread_from_rollout → get_rollout_history → reconstruction / resume</text><text x="750" y="692" text-anchor="middle" class="tiny">这条链说明恢复核心输入是 rollout history，而不是先从 SQLite 装回完整对象快照</text>
<path d="M 626 480 L 626 540 Q 626 594 680 594" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="166" y="790" width="1168" height="88" rx="18" fill="rgba(30,41,59,0.44)" stroke="#94a3b8" stroke-width="1.8"/><text x="750" y="826" text-anchor="middle" class="label">一句话收口</text><text x="750" y="854" text-anchor="middle" class="sub">rollout 存正文历史；SQLite 存索引、查询与展示视图。</text></svg>