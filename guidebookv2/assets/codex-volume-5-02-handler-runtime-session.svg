<svg width="1500" height="940" viewBox="0 0 1500 940" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/></pattern><marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/></marker><style>.title{font:700 34px 'JetBrains Mono',monospace;fill:#f8fafc}.subtitle{font:500 16px 'JetBrains Mono',monospace;fill:#94a3b8}.label{font:700 18px 'JetBrains Mono',monospace;fill:#f8fafc}.sub{font:500 13px 'JetBrains Mono',monospace;fill:#94a3b8}.tiny{font:500 12px 'JetBrains Mono',monospace;fill:#cbd5e1}.section{font:700 15px 'JetBrains Mono',monospace}.legend{font:600 12px 'JetBrains Mono',monospace;fill:#cbd5e1}</style></defs><rect width="1500" height="940" rx="28" fill="#020617"/><rect x="24" y="24" width="1452" height="892" rx="24" fill="url(#grid)"/>
<circle cx="88" cy="78" r="10" fill="#34d399"/><text x="114" y="88" class="title">handler 建入口，runtime 压实落地，session 才真正启动</text><text x="88" y="120" class="subtitle">卷五第二篇先立住：unified-exec 入口不等于命令已经开始运行；它先把动作转换成正式执行会话。</text>
<rect x="154" y="208" width="1192" height="270" rx="26" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.8" stroke-dasharray="12 8"/><text x="190" y="244" class="section" fill="#34d399">动作到会话的形态转换</text>
<rect x="208" y="326" width="210" height="118" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="313" y="366" text-anchor="middle" class="label">模型动作 / tool call</text><text x="313" y="394" text-anchor="middle" class="sub">主语还是“要做一件动作”</text>
<rect x="470" y="326" width="220" height="118" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="580" y="366" text-anchor="middle" class="label">UnifiedExecHandler</text><text x="580" y="394" text-anchor="middle" class="sub">先判断资格，再装配上下文</text>
<rect x="742" y="326" width="220" height="118" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="852" y="366" text-anchor="middle" class="label">runtime-ready request</text><text x="852" y="394" text-anchor="middle" class="sub">带身份、权限、workdir 的正式请求</text>
<rect x="1014" y="326" width="220" height="118" rx="18" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="2.2"/><text x="1124" y="366" text-anchor="middle" class="label">UnifiedExecRuntime</text><text x="1124" y="394" text-anchor="middle" class="sub">把请求压成当前环境下的 launch 方案</text>
<line x1="418" y1="385" x2="470" y2="385" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="690" y1="385" x2="742" y2="385" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="962" y1="385" x2="1014" y2="385" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrow)"/>
<rect x="524" y="574" width="452" height="128" rx="18" fill="rgba(251,146,60,0.16)" stroke="#fb923c" stroke-width="2.2"/><text x="750" y="616" text-anchor="middle" class="label">open_session_with_exec_env</text><text x="750" y="646" text-anchor="middle" class="sub">跨过 spawn 边界，真正启动 process session</text><text x="750" y="672" text-anchor="middle" class="tiny">到这里主语才从“执行请求”真正变成“已启动会话”</text>
<path d="M 1124 444 L 1124 520 Q 1124 574 1070 574 L 976 574" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
<rect x="174" y="780" width="1152" height="94" rx="18" fill="rgba(30,41,59,0.44)" stroke="#94a3b8" stroke-width="1.8"/><text x="750" y="818" text-anchor="middle" class="label">本篇最该记住的对象变化</text><text x="750" y="846" text-anchor="middle" class="sub">模型动作 → 正式执行请求 → launch 方案 → 已启动 process session。入口阶段先造身份与上下文，不是直接跑命令。</text></svg>