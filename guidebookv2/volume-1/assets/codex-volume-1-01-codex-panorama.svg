<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8"/>
    </pattern>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#94a3b8"/>
    </marker>
    <style>
      .title { font: 700 34px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #f8fafc; }
      .subtitle { font: 500 16px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #94a3b8; }
      .section { font: 700 15px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; }
      .label { font: 700 18px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #f8fafc; }
      .sub { font: 500 13px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #94a3b8; }
      .tiny { font: 500 12px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #cbd5e1; }
      .legend { font: 600 12px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1400" height="980" rx="28" fill="#020617"/>
  <rect x="24" y="24" width="1352" height="932" rx="24" fill="url(#grid)"/>

  <circle cx="86" cy="78" r="10" fill="#22d3ee"/>
  <text x="112" y="88" class="title">Codex 全景图：从入口壳到 thread runtime 主体</text>
  <text x="86" y="120" class="subtitle">卷一第一篇要先立住的判断：CLI 是入口壳，TUI 是交互前端，app-server 是控制面，真正持续推进工作线的是 runtime core。</text>

  <rect x="54" y="164" width="210" height="148" rx="16" fill="rgba(30,41,59,0.62)" stroke="#94a3b8" stroke-width="2"/>
  <text x="159" y="208" text-anchor="middle" class="label">用户 / 调用方</text>
  <text x="159" y="238" text-anchor="middle" class="sub">Terminal User</text>
  <text x="159" y="260" text-anchor="middle" class="sub">SDK / Automation</text>
  <text x="159" y="282" text-anchor="middle" class="sub">Remote Client</text>

  <rect x="328" y="156" width="260" height="164" rx="18" fill="rgba(8,51,68,0.32)" stroke="#22d3ee" stroke-width="2.2"/>
  <text x="458" y="194" text-anchor="middle" class="label">入口壳 / 交互前端</text>
  <text x="458" y="226" text-anchor="middle" class="sub">codex-cli · npm / rust CLI</text>
  <text x="458" y="250" text-anchor="middle" class="sub">TUI · interactive session</text>
  <text x="458" y="274" text-anchor="middle" class="sub">命令分流 / 请求组织 / 渲染回显</text>
  <text x="458" y="298" text-anchor="middle" class="tiny">负责把人送进系统，不持有真正 runtime 主体</text>

  <rect x="656" y="140" width="674" height="212" rx="22" fill="rgba(251,191,36,0.06)" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="10 6"/>
  <text x="682" y="172" class="section" fill="#fbbf24">控制面 / 对外协议层</text>

  <rect x="692" y="188" width="258" height="124" rx="16" fill="rgba(120,53,15,0.28)" stroke="#fbbf24" stroke-width="2"/>
  <text x="821" y="224" text-anchor="middle" class="label">app-server</text>
  <text x="821" y="252" text-anchor="middle" class="sub">request routing · session facade</text>
  <text x="821" y="276" text-anchor="middle" class="sub">listener / notification / state projection</text>
  <text x="821" y="300" text-anchor="middle" class="tiny">把已经活起来的 runtime 暴露成稳定接口面</text>

  <rect x="986" y="188" width="308" height="124" rx="16" fill="rgba(120,53,15,0.22)" stroke="#fbbf24" stroke-width="2"/>
  <text x="1140" y="224" text-anchor="middle" class="label">旁路入口</text>
  <text x="1140" y="252" text-anchor="middle" class="sub">mcp-server · exec-server</text>
  <text x="1140" y="276" text-anchor="middle" class="sub">remote app-server · SDK embedding</text>
  <text x="1140" y="300" text-anchor="middle" class="tiny">不是另一套主体，而是围绕 runtime 的不同接入面</text>

  <rect x="262" y="402" width="870" height="336" rx="26" fill="rgba(52,211,153,0.05)" stroke="#34d399" stroke-width="1.8" stroke-dasharray="12 8"/>
  <text x="294" y="438" class="section" fill="#34d399">runtime core / 真正的 thread runtime 主体</text>

  <rect x="318" y="478" width="218" height="178" rx="18" fill="#0f172a"/>
  <rect x="318" y="478" width="218" height="178" rx="18" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2.3"/>
  <text x="427" y="522" text-anchor="middle" class="label">ThreadManager</text>
  <text x="427" y="554" text-anchor="middle" class="sub">live thread runtime 协调者</text>
  <text x="427" y="578" text-anchor="middle" class="sub">生命周期 / 恢复 / 调度入口</text>
  <text x="427" y="606" text-anchor="middle" class="tiny">更接近 runtime owner，而不是普通 registry</text>

  <rect x="588" y="478" width="218" height="178" rx="18" fill="#0f172a"/>
  <rect x="588" y="478" width="218" height="178" rx="18" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2.3"/>
  <text x="697" y="522" text-anchor="middle" class="label">CodexThread</text>
  <text x="697" y="554" text-anchor="middle" class="sub">单线程工作线的正式交互面</text>
  <text x="697" y="578" text-anchor="middle" class="sub">submit / steer / next event / rollout</text>
  <text x="697" y="606" text-anchor="middle" class="tiny">上接控制面，下接更底层 Codex loop</text>

  <rect x="858" y="478" width="218" height="178" rx="18" fill="#0f172a"/>
  <rect x="858" y="478" width="218" height="178" rx="18" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2.3"/>
  <text x="967" y="522" text-anchor="middle" class="label">Codex</text>
  <text x="967" y="554" text-anchor="middle" class="sub">session / turn 主循环</text>
  <text x="967" y="578" text-anchor="middle" class="sub">工作面组织 · 模型采样 · 动作推进</text>
  <text x="967" y="606" text-anchor="middle" class="tiny">真正开始干活的 agent 主循环</text>

  <rect x="340" y="678" width="714" height="42" rx="10" fill="rgba(251,146,60,0.18)" stroke="#fb923c" stroke-width="1.4"/>
  <text x="697" y="704" text-anchor="middle" class="legend">thread / turn / history / recovery：把“一次响应”组织成“可持续推进、可中断恢复的工作线”</text>

  <rect x="90" y="442" width="124" height="90" rx="14" fill="rgba(136,19,55,0.38)" stroke="#fb7185" stroke-width="2"/>
  <text x="152" y="478" text-anchor="middle" class="label" style="font-size:16px">review</text>
  <text x="152" y="504" text-anchor="middle" class="sub">higher layer</text>

  <rect x="90" y="560" width="124" height="90" rx="14" fill="rgba(136,19,55,0.38)" stroke="#fb7185" stroke-width="2"/>
  <text x="152" y="596" text-anchor="middle" class="label" style="font-size:16px">guardian</text>
  <text x="152" y="622" text-anchor="middle" class="sub">policy / safety</text>

  <rect x="1180" y="444" width="150" height="92" rx="14" fill="rgba(76,29,149,0.36)" stroke="#a78bfa" stroke-width="2"/>
  <text x="1255" y="478" text-anchor="middle" class="label" style="font-size:16px">rollout</text>
  <text x="1255" y="504" text-anchor="middle" class="sub">event history</text>

  <rect x="1180" y="560" width="150" height="92" rx="14" fill="rgba(76,29,149,0.36)" stroke="#a78bfa" stroke-width="2"/>
  <text x="1255" y="594" text-anchor="middle" class="label" style="font-size:16px">state_db</text>
  <text x="1255" y="620" text-anchor="middle" class="sub">metadata / side state</text>

  <rect x="470" y="792" width="468" height="118" rx="18" fill="rgba(30,41,59,0.48)" stroke="#94a3b8" stroke-width="2"/>
  <text x="704" y="830" text-anchor="middle" class="label">执行 / 采样 / 能力调用 / 事件回流</text>
  <text x="704" y="860" text-anchor="middle" class="sub">model backend · unified-exec · tools · connectors · apps</text>
  <text x="704" y="886" text-anchor="middle" class="tiny">动作不是终点；结果会重新回到 runtime 主线，再由控制面投影给 TUI / 客户端</text>

  <line x1="264" y1="238" x2="326" y2="238" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrowhead)"/>
  <text x="296" y="228" text-anchor="middle" class="legend">进入系统</text>

  <line x1="588" y1="238" x2="688" y2="238" stroke="#22d3ee" stroke-width="2.2" marker-end="url(#arrowhead)"/>
  <text x="638" y="228" text-anchor="middle" class="legend">请求接入</text>

  <line x1="821" y1="314" x2="821" y2="474" stroke="#fbbf24" stroke-width="2.4" marker-end="url(#arrowhead)"/>
  <text x="838" y="394" class="legend">把 runtime 暴露成稳定控制面</text>

  <line x1="427" y1="566" x2="588" y2="566" stroke="#34d399" stroke-width="2.6" marker-end="url(#arrowhead)"/>
  <line x1="806" y1="566" x2="858" y2="566" stroke="#34d399" stroke-width="2.6" marker-end="url(#arrowhead)"/>

  <path d="M 967 658 L 967 732 Q 967 754 945 754 L 744 754 Q 704 754 704 790" stroke="#94a3b8" stroke-width="2.2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1000" y="722" class="legend">动作推进</text>

  <path d="M 640 792 L 640 748 Q 640 730 622 730 L 520 730" stroke="#fb923c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 770 792 L 770 748 Q 770 730 790 730 L 880 730" stroke="#fb923c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="704" y="766" text-anchor="middle" class="legend">结果回流 / 继续下一步</text>

  <path d="M 1160 490 L 1078 490" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 1160 606 L 1078 606" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1120" y="470" text-anchor="middle" class="legend">恢复材料</text>
  <text x="1120" y="642" text-anchor="middle" class="legend">辅助状态</text>

  <path d="M 214 488 L 316 540" stroke="#fb7185" stroke-width="1.8" stroke-dasharray="6 4" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 214 606 L 316 596" stroke="#fb7185" stroke-width="1.8" stroke-dasharray="6 4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="234" y="456" class="legend">更高层组织依赖 runtime</text>

  <path d="M 1006 238 L 964 238 Q 924 238 924 268 L 924 472" stroke="#fbbf24" stroke-width="1.8" stroke-dasharray="6 4" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1088" y="210" class="legend">多入口最终都绕回主体</text>

  <rect x="102" y="924" width="14" height="14" rx="3" fill="rgba(8,51,68,0.4)" stroke="#22d3ee"/>
  <text x="126" y="936" class="legend">入口壳 / 前端</text>
  <rect x="280" y="924" width="14" height="14" rx="3" fill="rgba(120,53,15,0.3)" stroke="#fbbf24"/>
  <text x="304" y="936" class="legend">控制面 / 协议层</text>
  <rect x="488" y="924" width="14" height="14" rx="3" fill="rgba(6,78,59,0.4)" stroke="#34d399"/>
  <text x="512" y="936" class="legend">runtime core</text>
  <rect x="640" y="924" width="14" height="14" rx="3" fill="rgba(76,29,149,0.36)" stroke="#a78bfa"/>
  <text x="664" y="936" class="legend">恢复 / 状态材料</text>
  <rect x="846" y="924" width="14" height="14" rx="3" fill="rgba(136,19,55,0.38)" stroke="#fb7185"/>
  <text x="870" y="936" class="legend">高层 runtime 组织</text>
  <line x1="1046" y1="931" x2="1082" y2="931" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="1094" y="936" class="legend">主工作线 / 回流关系</text>

</svg>
